name: Continuous Integration
author: Clément Chanchevrier @cchanche
description: 'Common job for CI checks, used in multiple workflows'

runs:
  using: 'composite'
  steps:
    - name: Check Format
      run: npm run format:check

    - name: Lint
      run: npm run lint

    - name: Type checks
      run: npm run tsc:check

    - name: Tests
      run: npm run test:run

    - name: Remove dist/ Directory
      run: rm -rf ./dist

    - name: Build coverage badge
      run: npm run coverage

    - name: Build JSON schemas
      run: npm run schemas

    - name: Build dist/ Directory
      run: npm run build

    - name: Compare repository state
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "::error::💥 Detected uncommitted or untracked changes after checks/build. No diffs are allowed. See status below:"
          git status --short
          git diff --ignore-space-at-eol --text
          exit 1
        fi
