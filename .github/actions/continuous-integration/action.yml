name: Continuous Integration
author: Clément Chanchevrier @cchanche
description: 'Common job for CI checks, used in multiple workflows'

runs:
  using: 'composite'
  steps:
    - name: Check Format
      run: npm run format:check
      shell: bash

    - name: Lint
      run: npm run lint
      shell: bash

    - name: Type checks
      run: npm run tsc:check
      shell: bash

    - name: Tests
      run: npm run test:run
      shell: bash

    - name: Remove dist/ Directory
      run: rm -rf ./dist
      shell: bash

    - name: Build coverage badge
      run: npm run coverage
      shell: bash

    - name: Build JSON schemas
      run: npm run schemas
      shell: bash

    - name: Build dist/ Directory
      run: npm run build
      shell: bash

    - name: Compare repository state
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "::error::💥 Detected uncommitted or untracked changes after checks/build."
          echo ""
          echo "This usually means generated files (dist/, coverage badge, JSON schemas) are out of date."
          echo ""
          echo "👉 Fix: run 'npm run all' locally before pushing. This runs formatting, linting,"
          echo "   type checking, tests, and regenerates all build artifacts."
          echo ""
          echo "Changed files:"
          git status --short
          echo ""
          git diff --ignore-space-at-eol --text
          exit 1
        fi
      shell: bash
