name: Continuous Integration
author: Clément Chanchevrier @cchanche
description: 'Common job for CI checks, used in multiple workflows'

runs:
  using: 'composite'
  steps:
    - name: Check Format
      run: npm run format:check
      shell: bash

    - name: Lint
      run: npm run lint
      shell: bash

    - name: Type checks
      run: npm run tsc:check
      shell: bash

    - name: Tests
      run: npm run test:run
      shell: bash

    - name: Remove dist/ Directory
      run: rm -rf ./dist
      shell: bash

    - name: Build coverage badge
      run: npm run coverage
      shell: bash

    - name: Build JSON schemas
      run: npm run schemas
      shell: bash

    - name: Build dist/ Directory
      run: npm run build
      shell: bash

    - name: Compare repository state
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "::error::💥 Detected uncommitted or untracked changes after checks/build. No diffs are allowed. See status below:"
          git status --short
          git diff --ignore-space-at-eol --text
          {
            echo "## ❌ Repository state check failed"
            echo ""
            echo "Uncommitted or untracked changes were detected after running checks and build steps."
            echo "This usually means the generated files (e.g. \`dist/\`, coverage badge, JSON schemas) are out of date."
            echo ""
            echo "### How to fix"
            echo ""
            echo "Run the following command locally before pushing:"
            echo ""
            echo '```sh'
            echo "npm run all"
            echo '```'
            echo ""
            echo "This will run formatting, linting, type checking, tests, and regenerate all build artifacts."
            echo ""
            echo "### Changed files"
            echo ""
            echo '```'
            git status --short
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1
        fi
      shell: bash
