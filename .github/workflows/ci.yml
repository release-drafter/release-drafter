name: Continuous Integration

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  smoke-test-drafter:
    name: '[drafter] Smoke Test'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - uses: ./
        with:
          config-file: file:release-drafter.tests.yml
          'dry-run': true

  smoke-test-autolabeler:
    name: '[autolabeler] Smoke Test'
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - uses: ./autolabeler
        with:
          config-file: file:release-drafter.autolabeler.tests.yml
          'dry-run': true

  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - uses: ./.github/actions/common-setup

      - name: Check Format
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type checks
        run: npm run tsc:check

      - name: Tests
        run: npm run test:run
