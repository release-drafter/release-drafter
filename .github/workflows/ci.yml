name: Continuous Integration

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  check-pr-labels:
    name: 'Check PR Labels'
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: "Check for type: label"
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Fetch at runtime so that re-running a failed workflow 
          # after adding a label will pick up the newly added label.
          LABELS=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/labels" --jq '.[].name')
          if echo "$LABELS" | grep -qE '^type: '; then
            echo "PR has a valid 'type: ' label."
          else
            echo "Error: PR must have at least one label starting with 'type: '."
            exit 1
          fi

  smoke-test-drafter:
    name: 'Smoke Test for Drafter'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./
        with:
          config-name: file:release-drafter.tests.yml
          dry-run: true

  smoke-test-autolabeler:
    name: 'Smoke Test for Autolabeler'
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./autolabeler
        with:
          config-name: file:release-drafter.autolabeler.tests.yml
          dry-run: true

  tests:
    name: Tests & Build-Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: npm

      - run: npm ci

      - name: Run all checks and rebuild artifacts
        run: npm run all

      - name: Upload coverage summary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-summary
          path: coverage/coverage-summary.json
          if-no-files-found: error

      - name: Check for clean working directory
        run: npm run check:clean

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: tests
    env:
      COVERAGE_THRESHOLD: '90'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: npm

      - run: npm ci

      # Downloads the artifact named below from this workflow run; `needs: tests` ensures that upload finished first.
      - name: Download coverage summary
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: coverage-summary
          path: coverage

      - name: Generate coverage summary
        id: coverage
        run: |
          COVERAGE=$(npm run --silent coverage)
          echo "pct=$COVERAGE" >> "$GITHUB_OUTPUT"

      - name: Enforce coverage threshold
        env:
          COVERAGE_PCT: ${{ steps.coverage.outputs.pct }}
          COVERAGE_MIN: ${{ env.COVERAGE_THRESHOLD }}
        run: |
          node --input-type=module <<'EOF'
          const pct = Number(process.env.COVERAGE_PCT)
          const min = Number(process.env.COVERAGE_MIN)

          if (Number.isNaN(pct)) {
            throw new Error(`Invalid coverage percentage: ${process.env.COVERAGE_PCT}`)
          }

          if (pct < min) {
            console.error(
              `Coverage ${pct.toFixed(2)}% is below required ${min.toFixed(0)}%`,
            )
            process.exit(1)
          }

          console.log(
            `Coverage ${pct.toFixed(2)}% meets required ${min.toFixed(0)}%`,
          )
          EOF
