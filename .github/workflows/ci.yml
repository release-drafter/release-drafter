name: Continuous Integration

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  smoke-test-drafter:
    name: '[drafter] Smoke Test'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Debug token wiring
        env:
          DEFAULT_TOKEN: ${{ github.token }}
        run: |
          node <<'NODE'
          console.log(JSON.stringify({
            githubTokenPresent: Boolean(process.env.DEFAULT_TOKEN),
            githubWorkspacePresent: Boolean(process.env.GITHUB_WORKSPACE),
            githubActionPathPresent: Boolean(process.env.GITHUB_ACTION_PATH)
          }))
          NODE

      - uses: ./
        with:
          'dry-run': true

  smoke-test-autolabeler:
    name: '[autolabeler] Smoke Test'
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Debug token wiring
        env:
          DEFAULT_TOKEN: ${{ github.token }}
        run: |
          node <<'NODE'
          console.log(JSON.stringify({
            githubTokenPresent: Boolean(process.env.DEFAULT_TOKEN),
            githubWorkspacePresent: Boolean(process.env.GITHUB_WORKSPACE),
            githubActionPathPresent: Boolean(process.env.GITHUB_ACTION_PATH)
          }))
          NODE

      - uses: ./autolabeler
        with:
          'dry-run': true

  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - uses: ./.github/actions/common-setup

      - name: Check Format
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type checks
        run: npm run tsc:check

      - name: Tests
        run: npm run test:run
