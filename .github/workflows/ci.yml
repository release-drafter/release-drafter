name: Continuous Integration

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: write # Required for "Set coverage status"
  statuses: write

jobs:
  check-pr-labels:
    name: 'Check PR Labels'
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: "Check for type: label"
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Fetch at runtime so that re-running a failed workflow 
          # after adding a label will pick up the newly added label.
          LABELS=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/labels" --jq '.[].name')
          if echo "$LABELS" | grep -qE '^type: '; then
            echo "PR has a valid 'type: ' label."
          else
            echo "Error: PR must have at least one label starting with 'type: '."
            exit 1
          fi

  smoke-test-drafter:
    name: 'Smoke Test for Drafter'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: ./
        with:
          config-name: file:release-drafter.tests.yml
          dry-run: true

  smoke-test-autolabeler:
    name: 'Smoke Test for Autolabeler'
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v6

      - uses: ./autolabeler
        with:
          config-name: file:release-drafter.autolabeler.tests.yml
          dry-run: true

  tests:
    name: Tests & Build-Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/common-setup

      - name: Run all checks and rebuild artifacts
        run: npm run all

      - name: Check for clean working directory
        run: npm run check:clean

      - name: Generate coverage summary
        id: coverage
        run: |
          COVERAGE=$(npx tsx src/scripts/coverage-summary.ts)
          echo "pct=$COVERAGE" >> "$GITHUB_OUTPUT"

      - name: Set coverage status
        uses: actions/github-script@v7
        with:
          script: |
            const pct = '${{ steps.coverage.outputs.pct }}';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              description: `${pct}%`,
              context: 'Coverage',
            });
