name: Capture PR Synchronize Event

on:
  pull_request:
    types:
      - synchronize

jobs:
  capture-event:
    runs-on: ubuntu-latest
    steps:
      - name: Capture PR synchronize event payload
        run: |
          mkdir -p event-payload
          cat > event-payload/pull_request-synchronize.json << 'EOF'
          ${{ toJson(github.event) }}
          EOF

      - name: Upload event payload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-synchronize-event
          path: event-payload/pull_request-synchronize.json
          retention-days: 7

      - name: Display event payload
        run: cat event-payload/pull_request-synchronize.json
