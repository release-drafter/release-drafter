name: Renovate Build

on:
  push:
    branches:
      - renovate/**

permissions:
  contents: write

jobs:
  build:
    name: Rebuild artifacts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/common-setup

      - name: Run all checks and rebuild artifacts
        run: npm run all

      - name: Commit updated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
              git add dist/ \
              badges/coverage.svg \
              src/types/github.graphql.generated.ts \
              src/actions/drafter/lib/find-pull-requests/graphql/find-commits-with-path-changes.graphql.generated.ts \
              src/actions/drafter/lib/find-pull-requests/graphql/find-commits-with-pr.graphql.generated.ts \
              schema.json \
              autolabeler/schema.json \
              drafter/schema.json
            git commit -m "chore(build): rebuild artifacts"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Check for clean working directory
        run: npm run check:clean
