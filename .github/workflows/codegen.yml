name: Update GraphQL Codegen

on:
  schedule:
    # First day of the month at 00:00 UTC
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  codegen:
    name: Regenerate GraphQL types
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: .node-version
          cache: npm

      - run: npm ci

      - name: Run codegen
        run: npm run codegen

      - name: Rebuild dist and run validation
        run: npm run all

      - name: Create PR if changed
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          commit-message: 'chore: update generated GraphQL types'
          title: 'chore: update generated GraphQL types'
          body: |
            Automated monthly update of GitHub GraphQL schema types.

            Generated by `npm run codegen`.

            > [!WARNING]
            > Automatically generated PRs won't trigger CI checks. Please ensure the changes are correct before merging.
          branch: chore/codegen-update
          delete-branch: true
          labels: "type: maintenance"
