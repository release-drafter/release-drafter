template: |
  Component helpers with $MAJOR template:
  - MAJOR: $NEXT_MAJOR_VERSION
  - MAJOR_MAJOR: $NEXT_MAJOR_VERSION_MAJOR
  - MAJOR_MINOR: $NEXT_MAJOR_VERSION_MINOR
  - MAJOR_PATCH: $NEXT_MAJOR_VERSION_PATCH

  - MINOR: $NEXT_MINOR_VERSION
  - MINOR_MAJOR: $NEXT_MINOR_VERSION_MAJOR
  - MINOR_MINOR: $NEXT_MINOR_VERSION_MINOR
  - MINOR_PATCH: $NEXT_MINOR_VERSION_PATCH

  - PATCH: $NEXT_PATCH_VERSION
  - PATCH_MAJOR: $NEXT_PATCH_VERSION_MAJOR
  - PATCH_MINOR: $NEXT_PATCH_VERSION_MINOR
  - PATCH_PATCH: $NEXT_PATCH_VERSION_PATCH

  - PRERELEASE: $NEXT_PRERELEASE_VERSION

  - Resolved : $RESOLVED_VERSION
name-template: 'Release Drafter v$NEXT_MAJOR_VERSION'
tag-template: 'v$NEXT_MAJOR_VERSION'
version-template: '$MAJOR'
