query findCommitsInComparison(
  $name: String!
  $owner: String!
  $baseRef: String!
  $headRef: String!
  $withPullRequestBody: Boolean!
  $withPullRequestURL: Boolean!
  $cursor: String
  $withBaseRefName: Boolean!
  $withHeadRefName: Boolean!
  $pullRequestLimit: Int!
  $historyLimit: Int!
) {
  repository(name: $name, owner: $owner) {
    ref(qualifiedName: $baseRef) {
      compare(headRef: $headRef) {
        commits(first: $historyLimit, after: $cursor) {
          __typename
          pageInfo {
            __typename
            hasNextPage
            endCursor
          }
          nodes {
            __typename
            id
            oid
            committedDate
            message
            author {
              __typename
              name
              user {
                __typename
                login
              }
            }
            authors(first: 100) {
              nodes {
                __typename
                name
                user {
                  __typename
                  login
                }
              }
            }
            associatedPullRequests(first: $pullRequestLimit) {
              __typename
              nodes {
                ...PullRequestFields
              }
            }
          }
        }
      }
    }
  }
}
