query findCommitsWithAssociatedPullRequests(
  $name: String!
  $owner: String!
  $targetCommitish: String!
  $withPullRequestBody: Boolean!
  $withPullRequestURL: Boolean!
  $since: GitTimestamp
  $after: String
  $withBaseRefName: Boolean!
  $withHeadRefName: Boolean!
  $pullRequestLimit: Int!
  $historyLimit: Int!
) {
  repository(name: $name, owner: $owner) {
    object(expression: $targetCommitish) {
      ... on Commit {
        __typename
        history(first: $historyLimit, since: $since, after: $after) {
          __typename
          totalCount
          pageInfo {
            __typename
            hasNextPage
            endCursor
          }
          nodes {
            __typename
            id
            committedDate
            message
            author {
              __typename
              name
              user {
                __typename
                login
              }
            }
            associatedPullRequests(first: $pullRequestLimit) {
              __typename
              nodes {
                __typename
                title
                number
                url @include(if: $withPullRequestURL)
                body @include(if: $withPullRequestBody)
                author {
                  __typename
                  login
                  url
                }
                baseRepository {
                  __typename
                  nameWithOwner
                }
                mergedAt
                isCrossRepository
                labels(first: 100) {
                  __typename
                  nodes {
                    __typename
                    name
                  }
                }
                merged
                baseRefName @include(if: $withBaseRefName)
                headRefName @include(if: $withHeadRefName)
              }
            }
          }
        }
      }
    }
  }
}
